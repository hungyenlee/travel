name: CI

# 對進入 main 的 PR（與 main 本身的 push）跑基本檢查。
# 這是純靜態站，無建置流程，只做最能防止「壞掉直接上線」的檢查。
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JS 語法檢查（node --check）
        shell: bash
        run: |
          set -e
          found=0
          while IFS= read -r -d '' f; do
            echo "node --check $f"
            node --check "$f"
            found=1
          done < <(find data assets/js scripts \( -name '*.js' -o -name '*.mjs' \) -print0 2>/dev/null)
          if [ "$found" -eq 0 ]; then
            echo "找不到任何 JS 檔可檢查" >&2
            exit 1
          fi

      - name: HTML 引用檢查
        run: node scripts/check-html-refs.mjs
