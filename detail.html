<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>地點詳細資訊 · 台灣散步筆記</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    /* 詳細頁專用的小幅間距調整（僅補充，不重新設計共用元件） */
    /* 詳細頁的分類與標籤群組：小標橫向排列、可換行 */
    .detail-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
    }
    /* 每個資訊區塊的小標題（例如「地址」「營業時間」） */
    .detail-label {
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: var(--space-xs);
    }
    /* 讓大圖連結不帶底線、hover 時圖片微微變化 */
    .detail-media a { display: block; }
    .detail-media a:hover { text-decoration: none; }
    /* 返回連結的間距 */
    .detail-back { margin-block: var(--space-md); display: inline-block; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="index.html">台灣散步筆記</a>
      <nav class="nav"><a href="index.html#cities">探索城市</a><a href="plan.html">我的行程</a></nav>
    </div>
  </header>

  <main class="container">
    <!-- 內容由 detail.js 依網址上的 ?id= 填入 -->
    <div id="detail-root"></div>
  </main>

  <footer class="site-footer">
    <div class="container">台灣散步筆記 · 探索台灣各城市的景點與美食</div>
  </footer>

  <script src="data/data.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/trip-store.js"></script>
  <script src="assets/js/trip-picker.js"></script>
  <script src="assets/js/detail.js"></script>
</body>
</html>
